<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客展示</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <button id="back-to-index" class="back-btn"><i class="fa fa-arrow-left"></i> 返回博客列表</button>

        <div class="header">
            <h1 id="blog-title"></h1>
            <div class="tags" id="blog-tags"></div>
            <button id="edit-blog" class="edit-btn"><i class="fa fa-edit"></i> 编辑文章</button>
        </div>

        <!-- Commit信息区域 -->
        <div class="commit-info-panel" id="commit-info-panel" style="display: none;">
            <h3><i class="fa fa-code-branch"></i> 最新提交信息</h3>
            <div class="commit-details">
                <div class="commit-row">
                    <span class="commit-label"><i class="fa fa-user"></i> 提交人:</span>
                    <span class="commit-value" id="commit-author"></span>
                </div>
                <div class="commit-row">
                    <span class="commit-label"><i class="fa fa-clock-o"></i> 提交时间:</span>
                    <span class="commit-value" id="commit-date"></span>
                </div>
                <div class="commit-row">
                    <span class="commit-label"><i class="fa fa-comment"></i> 提交信息:</span>
                    <span class="commit-value" id="commit-message"></span>
                </div>
                <div class="commit-row">
                    <span class="commit-label"><i class="fa fa-hashtag"></i> 提交HASH:</span>
                    <a class="commit-value commit-sha" id="commit-sha" target="_blank"></a>
                </div>
            </div>
        </div>

        <div class="content">
            <div id="loading" class="loading"><i class="fa fa-spinner fa-spin"></i> 加载中...</div>
            <div id="error" class="error" style="display: none;"></div>
            <div id="blog-content" class="entry" style="display: none;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$','$'], ["\\(","\\)"]],
                processEscapes: true
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js"></script>

    <script type="module">
        import { renderMarkdown } from '../js/blog-utils.js';

        // 解析URL参数
        function getUrlParams() {
            const params = {};
            const queryString = window.location.search.slice(1);
            queryString.split('&').forEach(pair => {
                const [key, value] = pair.split('=');
                if (key && value) {
                    params[key] = decodeURIComponent(value);
                }
            });
            return params;
        }

        // 显示提交信息
        function displayCommitInfo(commitInfo, owner, repo, fullSha) {
            if (!commitInfo) return;

            document.getElementById('commit-author').textContent = commitInfo.author;
            document.getElementById('commit-date').textContent = commitInfo.date.toLocaleString();
            document.getElementById('commit-message').textContent = commitInfo.message;
            document.getElementById('commit-sha').textContent = commitInfo.sha;
            document.getElementById('commit-sha').href = `https://github.com/${owner}/${repo}/commit/${fullSha}`;

            document.getElementById('commit-info-panel').style.display = 'block';
        }

        // 返回博客列表
        document.getElementById('back-to-index').addEventListener('click', () => {
            window.location.href = '../index.html';
        });

        // 编辑文章
        document.getElementById('edit-blog').addEventListener('click', () => {
            const params = getUrlParams();
            window.location.href = `../blog-edit.html?blog=${params.blog}`;
        });

        // 主函数
        async function init() {
            try {
                const params = getUrlParams();
                const blog = params.blog;

                if (!blog) {
                    throw new Error('缺少必要参数: blog');
                }

                // 解析仓库信息
                const hostname = window.location.hostname;
                const owner = hostname.split('.github.io')[0];
                const repo = hostname;
                const branch = 'main';

                // 加载配置文件
                const configResponse = await fetch('../blog-config.json');
                if (!configResponse.ok) {
                    throw new Error('无法加载配置文件');
                }
                const config = await configResponse.json();

                // 遍历所有分组查找对应的博客信息
                let blogInfo = null;
                for (const groupName in config) {
                    const found = config[groupName].find(item => item.title === blog);
                    if (found) {
                        blogInfo = found;
                        break;
                    }
                }

                if (!blogInfo) {
                    throw new Error(`找不到博客: ${blog}`);
                }

                // 显示博客标题和标签
                document.getElementById('blog-title').textContent = blogInfo.title;
                const tagsContainer = document.getElementById('blog-tags');
                tagsContainer.innerHTML = '';
                blogInfo.tags.forEach(tag => {
                    const tagElement = document.createElement('span');
                    tagElement.className = 'tag';
                    tagElement.textContent = tag;
                    tagsContainer.appendChild(tagElement);
                });

                // 获取提交信息
                const commitResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/commits?path=${blogInfo.path.split('/').map(s => encodeURIComponent(s)).join('/')}&ref=${branch}&per_page=1`);
                if (commitResponse.ok) {
                    const commits = await commitResponse.json();
                    if (commits && commits.length > 0) {
                        const commit = commits[0];
                        const commitInfo = {
                            author: commit.commit.committer.name || commit.author?.login || '未知',
                            date: new Date(commit.commit.committer.date),
                            message: commit.commit.message,
                            sha: commit.sha.substring(0, 7)
                        };
                        displayCommitInfo(commitInfo, owner, repo, commit.sha);
                    }
                }

                // 加载Markdown文件
                const markdownResponse = await fetch(blogInfo.path);
                if (!markdownResponse.ok) {
                    throw new Error(`无法加载博客内容: ${blogInfo.path}`);
                }
                const markdownContent = await markdownResponse.text();

                // 渲染Markdown
                const htmlContent = renderMarkdown(markdownContent);
                const contentContainer = document.getElementById('blog-content');
                contentContainer.innerHTML = htmlContent;

                // 代码高亮
                Prism.highlightAll();

                // 显示内容的函数
                const showContent = () => {
                    document.getElementById('loading').style.display = 'none';
                    contentContainer.style.display = 'block';
                };

                // 渲染数学公式并等待完成后显示内容
                if (window.MathJax) {
                    const renderMath = async () => {
                        if (window.MathJax.typesetPromise) {
                            try {
                                await window.MathJax.typesetPromise([contentContainer]);
                                showContent();
                            } catch (e) {
                                console.warn('MathJax渲染警告:', e);
                                showContent(); // 即使渲染失败也显示内容
                            }
                        } else {
                            showContent();
                        }
                    };

                    if (window.MathJax.startup && window.MathJax.startup.promise) {
                        await window.MathJax.startup.promise
                            .then(renderMath)
                            .catch(err => {
                                console.warn('MathJax初始化警告:', err);
                                showContent();
                            });
                    } else if (window.MathJax.typesetPromise) {
                        // 延迟后渲染
                        setTimeout(() => {
                            renderMath();
                        }, 100);
                    } else {
                        showContent();
                    }
                } else {
                    showContent();
                }

            } catch (error) {
                console.error('加载失败:', error);
                const errorContainer = document.getElementById('error');
                errorContainer.textContent = `加载失败: ${error.message}`;
                errorContainer.style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
